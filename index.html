<!DOCTYPE html>

<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solbars — Var är solen nu?</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:          #f5f0e8;
      --text:        #1c1814;
      --accent:      #b5651d;
      --accent-warm: #d4956a;
      --sun-clear:   #c87f3a;
      --sun-cloudy:  #8a6842;
      --shade-blue:  #3d4754;
      --muted:       #5c5347;
      --border:      #d9d0c0;
      --surface:     #faf6ef;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      padding: 0.9rem 1.25rem 0.7rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--bg);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--accent);
    }

    .tagline {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
      margin-top: 0.15rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .sun-meta {
      text-align: right;
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
    }

    /* ── Map ── */
    #map {
      height: 44vh;
      width: 100%;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    /* ── Time picker ── */
    #time-picker {
      padding: 0.55rem 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    #time-picker .time-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--muted);
      flex-shrink: 0;
    }

    #time-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 1px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    #time-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: pointer;
      box-shadow: none;
    }

    #time-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: pointer;
      box-shadow: none;
    }

    #time-slider::-moz-range-track {
      height: 1px;
      background: var(--border);
      border: none;
    }

    #time-display {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 400;
      color: var(--accent);
      flex-shrink: 0;
      min-width: 2.8rem;
      text-align: right;
    }

    #time-reset {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--accent);
      background: none;
      border: 1px solid var(--accent);
      border-radius: 2px;
      padding: 0.15rem 0.5rem;
      cursor: pointer;
      flex-shrink: 0;
      letter-spacing: 0.02em;
      display: none;
    }

    #time-reset:active { opacity: 0.6; }

    /* ── Status bar ── */
    #status-bar {
      padding: 0.35rem 1.25rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      color: var(--muted);
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Bar list ── */
    #bar-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 1.25rem 1.25rem;
      -webkit-overflow-scrolling: touch;
    }

    .bar-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .bar-item:first-child { padding-top: 0.75rem; }
    .bar-item:last-child { border-bottom: none; }
    .bar-item:hover { opacity: 0.7; }

    .sun-dot {
      width: 1.5rem;
      height: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1rem;
      line-height: 1;
    }

    .sun-clear .sun-dot  { color: var(--sun-clear); }
    .sun-cloudy .sun-dot { color: var(--sun-cloudy); }
    .no-sun  .sun-dot    { color: var(--shade-blue); }

    .bar-info { flex: 1; min-width: 0; }

    .bar-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.25;
    }

    .bar-sub {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 300;
      margin-top: 0.1rem;
      line-height: 1.3;
    }

    .bar-change {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      text-align: right;
      flex-shrink: 0;
      max-width: 120px;
      line-height: 1.3;
    }

    .sun-clear .bar-name    { color: var(--text); }
    .sun-clear .bar-change  { color: var(--sun-clear); }
    .sun-cloudy .bar-name   { color: var(--text); }
    .sun-cloudy .bar-change { color: var(--sun-cloudy); }
    .no-sun  .bar-name      { color: var(--shade-blue); }
    .no-sun  .bar-change    { color: var(--shade-blue); }

    /* ── Loading / empty ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      gap: 0;
      color: var(--muted);
    }

    .loading-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1.1rem;
    }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    .pulse-dots {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.8rem;
    }

    .pulse-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .pulse-dots span:nth-child(2) { animation-delay: 0.2s; }
    .pulse-dots span:nth-child(3) { animation-delay: 0.4s; }

    .empty {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--muted);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-style: italic;
      line-height: 1.6;
    }

    /* ── Leaflet tweaks ── */
    .leaflet-popup-content-wrapper {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      border-radius: 2px;
      box-shadow: none;
      border: 1px solid var(--border);
    }

    .leaflet-popup-tip { box-shadow: none; }

    .leaflet-control-attribution {
      font-size: 0.6rem !important;
      opacity: 0.5;
    }
  </style>

</head>
<body>

<header>
  <div>
    <h1>Solbars</h1>
    <div class="tagline">Var är solen just nu?</div>
  </div>
  <div class="sun-meta" id="sun-meta">Hämtar position…</div>
</header>

<div id="map"></div>

<div id="time-picker">
  <div class="time-label">Tid</div>
  <input type="range" id="time-slider" min="0" max="95" value="0" step="1">
  <div id="time-display">Nu</div>
  <button id="time-reset">Nu</button>
</div>

<div id="status-bar">Initierar…</div>

<div id="bar-list">
  <div class="loading">
    <div class="pulse-dots"><span></span><span></span><span></span></div>
    <span class="loading-text">Hämtar data från OpenStreetMap…</span>
  </div>
</div>

<!-- Dependencies -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>

<script>
'use strict';

/*
 * Solbars — visar vilka barer som har sol just nu.
 *
 * 1. Hämta position (geolokalisering eller Södermalm-fallback).
 * 2. Ladda barer + byggnader via Overpass GET-fetch med tre fallback-servrar.
 * 3. För varje bar: förberäkna närliggande byggnader, raycasta mot solen.
 * 4. Tidsväljare: slider 05:00–00:00 i 15-min-steg. "Nu" = live med
 *    auto-refresh var 5:e minut; manuell tid pausar auto-refresh.
 * 5. Rendrera lista + Leaflet-markörer, sorterat sol-först.
 *
 * OBS: Filen måste öppnas i en riktig webbläsare (inte i en iframe/sandbox).
 */

// ── Constants ─────────────────────────────────────────────
const RADIUS_M        = 500;
const RAY_LENGTH_M    = 300;
const BUILDING_H_M    = 22;
const MIN_HIT_DIST_M  = 5;
const CHANGE_STEP_MIN = 10;
const CHANGE_HORIZON  = 300;

let userLat = 59.3155;
let userLng = 18.0710;

let leafletMap = null;
let mapMarkers = [];
let enrichedData = null;
let autoRefreshId = null;
let isManualTime = false;
let cloudCover = null; // 0–100, null if unknown

// ── Time picker helpers ───────────────────────────────────
function sliderToDate(pos) {
  if (pos === 0) return new Date();
  const today = new Date();
  const base = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 5, 0, 0);
  return new Date(base.getTime() + (pos - 1) * 15 * 60000);
}

function sliderToLabel(pos) {
  if (pos === 0) return 'Nu';
  const d = sliderToDate(pos);
  return d.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
}

// ── Geolocation ───────────────────────────────────────────
function getLocation() {
  return new Promise(resolve => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      p => resolve({ lat: p.coords.latitude, lng: p.coords.longitude }),
      () => resolve(null),
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 }
    );
  });
}

// ── Cloud cover ───────────────────────────────────────────
async function fetchCloudCover(lat, lng) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lng.toFixed(4)}&current=cloud_cover`;
    const resp = await fetch(url);
    if (!resp.ok) return null;
    const data = await resp.json();
    return data?.current?.cloud_cover ?? null;
  } catch { return null; }
}

function cloudLabel(pct) {
  if (pct == null) return null;
  if (pct < 20) return 'Klart';
  if (pct < 50) return 'Lätt molnighet';
  if (pct < 80) return 'Halvklart';
  if (pct < 90) return 'Molnigt';
  return 'Mulet';
}

// ── Sun helpers ───────────────────────────────────────────
function sunPosition(lat, lng, date = new Date()) {
  return SunCalc.getPosition(date, lat, lng);
}

function renderSunMeta(lat, lng, date) {
  const pos   = sunPosition(lat, lng, date);
  const times = SunCalc.getTimes(date, lat, lng);
  const altDeg = (pos.altitude * 180 / Math.PI).toFixed(1);
  const aziDeg = ((pos.azimuth * 180 / Math.PI + 180 + 360) % 360).toFixed(0);
  const timeStr = date.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
  const sunset  = times.sunset;
  const sunsetStr = isFinite(sunset)
    ? sunset.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' })
    : '—';
  const cloudStr = cloudCover != null ? `${cloudLabel(cloudCover)} ${cloudCover}%` : '';
  document.getElementById('sun-meta').innerHTML =
    `Kl. ${timeStr}<br>` +
    `Solhöjd ${altDeg}° · Azimut ${aziDeg}°<br>` +
    (cloudStr ? `${cloudStr} · ` : '') +
    `Nedgång ${sunsetStr}`;
}

// ── Overpass ──────────────────────────────────────────────
function makeBbox(lat, lng, r) {
  const dLat = r / 111000;
  const dLng = r / (111000 * Math.cos(lat * Math.PI / 180));
  return `${lat - dLat},${lng - dLng},${lat + dLat},${lng + dLng}`;
}

async function fetchOverpass(lat, lng) {
  const bbox = makeBbox(lat, lng, RADIUS_M);
  const q = `[out:json][timeout:30];(node["amenity"~"^(bar|pub)$"](${bbox});way["amenity"~"^(bar|pub)$"](${bbox});way["building"](${bbox}););out body;>;out skel qt;`;
  const encoded = encodeURIComponent(q);

  const hosts = [
    'https://overpass-api.de/api/interpreter',
    'https://overpass.kumi.systems/api/interpreter',
  ];

  // Strategy 1: direct fetch
  for (const host of hosts) {
    try {
      const resp = await fetch(`${host}?data=${encoded}`, { method: 'GET' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return await resp.json();
    } catch (e) { /* try next */ }
  }

  // Strategy 2: JSONP via allorigins (works when fetch is blocked but <script> isn't)
  for (const host of hosts) {
    try {
      return await new Promise((resolve, reject) => {
        const cb = '_ovcb_' + Date.now();
        const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 35000);

        function cleanup() {
          clearTimeout(timer);
          delete window[cb];
          const s = document.getElementById('_ov_jsonp');
          if (s) s.remove();
        }

        window[cb] = function(data) {
          cleanup();
          try { resolve(JSON.parse(data.contents)); }
          catch (e) { reject(new Error('Ogiltigt svar')); }
        };

        const target = `${host}?data=${encoded}`;
        const s = document.createElement('script');
        s.id = '_ov_jsonp';
        s.src = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}&callback=${cb}`;
        s.onerror = () => { cleanup(); reject(new Error('Blockerad')); };
        document.head.appendChild(s);
      });
    } catch (e) { /* try next */ }
  }

  throw new Error('Kunde inte hämta data. Öppna filen lokalt i en webbläsare på en dator.');
}

function parseOverpass(data) {
  const nodeMap = {};
  data.elements.forEach(el => {
    if (el.type === 'node') nodeMap[el.id] = { lat: el.lat, lng: el.lon };
  });

  const bars = [], buildings = [];

  data.elements.forEach(el => {
    const tags = el.tags || {};

    if (tags.amenity === 'bar' || tags.amenity === 'pub') {
      let lat, lng;
      if (el.type === 'node') {
        lat = el.lat; lng = el.lon;
      } else if (el.type === 'way' && el.nodes) {
        const cs = el.nodes.map(id => nodeMap[id]).filter(Boolean);
        if (!cs.length) return;
        lat = cs.reduce((s, c) => s + c.lat, 0) / cs.length;
        lng = cs.reduce((s, c) => s + c.lng, 0) / cs.length;
      } else return;
      if (lat != null && lng != null)
        bars.push({ id: el.id, name: tags.name || (tags.amenity === 'pub' ? 'Pub' : 'Bar'), type: tags.amenity, lat, lng });
    }

    if (tags.building && el.type === 'way' && el.nodes) {
      const cs = el.nodes.map(id => nodeMap[id]).filter(Boolean);
      if (cs.length >= 3) buildings.push({ id: el.id, coords: cs });
    }
  });

  return { bars, buildings };
}

// ── Geometry ──────────────────────────────────────────────

function offsetPoint(lat, lng, azimuth, distM) {
  const dLat = -Math.cos(azimuth) * distM / 111000;
  const dLng = -Math.sin(azimuth) * distM / (111000 * Math.cos(lat * Math.PI / 180));
  return { lat: lat + dLat, lng: lng + dLng };
}

function distM(lat1, lng1, lat2, lng2) {
  const dy = (lat2 - lat1) * 111000;
  const dx = (lng2 - lng1) * 111000 * Math.cos(lat1 * Math.PI / 180);
  return Math.sqrt(dx * dx + dy * dy);
}

function nearbyBuildings(barLat, barLng, allBuildings, maxDist = RAY_LENGTH_M + 20) {
  return allBuildings.filter(b => {
    const centLat = b.coords.reduce((s, c) => s + c.lat, 0) / b.coords.length;
    const centLng = b.coords.reduce((s, c) => s + c.lng, 0) / b.coords.length;
    if (distM(barLat, barLng, centLat, centLng) > maxDist) return false;

    try {
      const cs = b.coords.map(c => [c.lng, c.lat]);
      if (cs[0][0] !== cs[cs.length - 1][0] || cs[0][1] !== cs[cs.length - 1][1])
        cs.push([...cs[0]]);
      if (cs.length < 4) return true;
      return !turf.booleanPointInPolygon(turf.point([barLng, barLat]), turf.polygon([cs]));
    } catch { return true; }
  });
}

function raycast(barLat, barLng, azimuth, buildings) {
  const end = offsetPoint(barLat, barLng, azimuth, RAY_LENGTH_M);
  const ray = turf.lineString([[barLng, barLat], [end.lng, end.lat]]);
  const origin = turf.point([barLng, barLat]);

  let minDist = null;

  for (const b of buildings) {
    try {
      const cs = b.coords.map(c => [c.lng, c.lat]);
      if (cs[0][0] !== cs[cs.length - 1][0] || cs[0][1] !== cs[cs.length - 1][1])
        cs.push([...cs[0]]);
      if (cs.length < 4) continue;

      const hits = turf.lineIntersect(ray, turf.polygon([cs]));
      for (const pt of hits.features) {
        const d = turf.distance(origin, pt, { units: 'meters' });
        if (d >= MIN_HIT_DIST_M && (minDist === null || d < minDist)) minDist = d;
      }
    } catch { /* skip malformed polygon */ }
  }

  return minDist;
}

// ── Sun status ────────────────────────────────────────────

function computeStatus(bar, cached_nearby, date = new Date()) {
  const pos = sunPosition(bar.lat, bar.lng, date);

  if (pos.altitude <= 0.017)
    return { hasSun: false, reason: 'natt', dist: null };

  const dist = raycast(bar.lat, bar.lng, pos.azimuth, cached_nearby);

  if (dist === null)
    return { hasSun: true, reason: 'fri sikt', dist: null };

  const shadowAngle = Math.atan(BUILDING_H_M / dist);
  return {
    hasSun:      pos.altitude > shadowAngle,
    dist:        Math.round(dist),
    shadowAngleDeg: (shadowAngle * 180 / Math.PI).toFixed(1),
    sunAltDeg:   (pos.altitude * 180 / Math.PI).toFixed(1),
    reason:      null
  };
}

function findSunChange(bar, cached_nearby, currentHasSun, fromDate = new Date()) {
  for (let min = CHANGE_STEP_MIN; min <= CHANGE_HORIZON; min += CHANGE_STEP_MIN) {
    const t = new Date(fromDate.getTime() + min * 60000);
    const pos = sunPosition(bar.lat, bar.lng, t);
    if (pos.altitude <= 0.017) {
      return currentHasSun ? { minutes: min, type: 'solnedgång' } : null;
    }
    const dist = raycast(bar.lat, bar.lng, pos.azimuth, cached_nearby);
    let newHasSun;
    if (dist === null) {
      newHasSun = true;
    } else {
      newHasSun = pos.altitude > Math.atan(BUILDING_H_M / dist);
    }
    if (newHasSun !== currentHasSun)
      return { minutes: min, type: currentHasSun ? 'tappar sol' : 'får sol' };
  }
  return null;
}

// ── Render ────────────────────────────────────────────────

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function sunClass(hasSun) {
  if (!hasSun) return 'no-sun';
  if (cloudCover != null && cloudCover >= 90) return 'no-sun';
  if (cloudCover != null && cloudCover >= 50) return 'sun-cloudy';
  return 'sun-clear';
}

function renderList(items) {
  const el = document.getElementById('bar-list');
  if (!items.length) {
    el.innerHTML = '<div class="empty">Inga barer hittades inom ' + RADIUS_M + ' meter.</div>';
    return;
  }

  const overcast = cloudCover != null && cloudCover >= 90;

  const sorted = [...items].sort((a, b) => {
    if (a.status.hasSun !== b.status.hasSun) return a.status.hasSun ? -1 : 1;
    if (a.change && b.change) return b.change.minutes - a.change.minutes;
    return a.bar.name.localeCompare(b.bar.name, 'sv');
  });

  el.innerHTML = sorted.map(({ bar, status, change }) => {
    const cls = sunClass(status.hasSun);
    const icon = cls === 'no-sun' ? '●' : '○';

    let sub = '';
    if (overcast && status.hasSun) sub = 'Geometrisk sol — men mulet';
    else if (status.reason === 'natt') sub = 'Solen är under horisonten';
    else if (status.dist) sub = `Byggnad ${status.dist} m bort · skuggvinkel ${status.shadowAngleDeg}°`;
    else sub = 'Fri sikt mot solen';

    let changeText = '';
    if (overcast && status.hasSun) {
      changeText = '';
    } else if (change) {
      if      (change.type === 'tappar sol')   changeText = `Skugga om ${change.minutes} min`;
      else if (change.type === 'får sol')      changeText = `Sol om ${change.minutes} min`;
      else if (change.type === 'solnedgång')   changeText = `Nedgång om ${change.minutes} min`;
    } else if (status.hasSun) {
      changeText = 'Sol > 5 h';
    } else {
      changeText = '';
    }

    return `<div class="bar-item ${cls}"
                 onclick="flyTo(${bar.lat},${bar.lng})">
      <div class="sun-dot">${icon}</div>
      <div class="bar-info">
        <div class="bar-name">${esc(bar.name)}</div>
        <div class="bar-sub">${esc(sub)}</div>
      </div>
      <div class="bar-change">${esc(changeText)}</div>
    </div>`;
  }).join('');
}

function renderMarkers(items) {
  mapMarkers.forEach(m => leafletMap.removeLayer(m));
  mapMarkers = [];

  const colors = {
    'sun-clear':  { stroke: '#c87f3a', fill: '#d4a86a' },
    'sun-cloudy': { stroke: '#8a6842', fill: '#a8926e' },
    'no-sun':     { stroke: '#3d4754', fill: '#a0aab4' },
  };

  items.forEach(({ bar, status, change }) => {
    const cls = sunClass(status.hasSun);
    const c = colors[cls];
    let popup = `<strong>${esc(bar.name)}</strong><br>${cls !== 'no-sun' ? '○ Sol' : '● Skugga'}`;
    if (status.dist) popup += `<br>Byggnad ${status.dist} m bort`;
    if (change && cls !== 'no-sun') popup += `<br><em>${change.type} om ${change.minutes} min</em>`;
    const m = L.circleMarker([bar.lat, bar.lng], {
      radius: 6, color: c.stroke, fillColor: c.fill, fillOpacity: 0.9, weight: 1.5
    }).bindPopup(popup).addTo(leafletMap);
    mapMarkers.push(m);
  });
}

window.flyTo = function(lat, lng) {
  leafletMap.flyTo([lat, lng], 17, { duration: 0.8 });
};

// ── Update for a given time ───────────────────────────────

function updateForTime(date) {
  if (!enrichedData) return;

  renderSunMeta(userLat, userLng, date);

  const items = enrichedData.map(({ bar, nb }) => {
    const status = computeStatus(bar, nb, date);
    const change = findSunChange(bar, nb, status.hasSun, date);
    return { bar, status, change, nb };
  });

  const sunCount = items.filter(e => e.status.hasSun).length;
  const timeStr = date.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
  const statusEl = document.getElementById('status-bar');

  const cl = cloudLabel(cloudCover);
  const cloudBit = cl ? ` · ${cl} ${cloudCover}%` : '';

  if (isManualTime) {
    statusEl.textContent =
      `Visar ${timeStr} · ${enrichedData.length} barer · ${sunCount} i sol${cloudBit}`;
  } else {
    statusEl.textContent =
      `${enrichedData.length} barer · ${sunCount} har sol${cloudBit} · ${timeStr}`;
  }

  renderList(items);
  renderMarkers(items);
}

// ── Time picker logic ─────────────────────────────────────

function initTimePicker() {
  const slider  = document.getElementById('time-slider');
  const display = document.getElementById('time-display');
  const reset   = document.getElementById('time-reset');

  slider.addEventListener('input', () => {
    const pos = parseInt(slider.value, 10);
    if (pos === 0) {
      isManualTime = false;
      display.textContent = 'Nu';
      reset.style.display = 'none';
      startAutoRefresh();
      updateForTime(new Date());
    } else {
      isManualTime = true;
      display.textContent = sliderToLabel(pos);
      reset.style.display = 'inline-block';
      stopAutoRefresh();
      updateForTime(sliderToDate(pos));
    }
  });

  reset.addEventListener('click', () => {
    slider.value = 0;
    isManualTime = false;
    display.textContent = 'Nu';
    reset.style.display = 'none';
    startAutoRefresh();
    updateForTime(new Date());
  });
}

function startAutoRefresh() {
  stopAutoRefresh();
  autoRefreshId = setInterval(() => {
    if (!isManualTime) updateForTime(new Date());
  }, 5 * 60 * 1000);
}

function stopAutoRefresh() {
  if (autoRefreshId) {
    clearInterval(autoRefreshId);
    autoRefreshId = null;
  }
}

// ── Overpass cache ─────────────────────────────────────────
const CACHE_TTL_MS = 24 * 60 * 60 * 1000; // 24 h

function cacheKey(lat, lng) {
  // Round to ~500 m grid cells
  const gridLat = (Math.round(lat * 200) / 200).toFixed(3);
  const gridLng = (Math.round(lng * 100) / 100).toFixed(3);
  return `solbars_${gridLat}_${gridLng}`;
}

function getCached(lat, lng) {
  try {
    const key = cacheKey(lat, lng);
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL_MS) { localStorage.removeItem(key); return null; }
    return data;
  } catch { return null; }
}

function setCache(lat, lng, data) {
  try {
    const key = cacheKey(lat, lng);
    localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data }));
  } catch { /* quota exceeded — ignore */ }
}

// ── Main ──────────────────────────────────────────────────

let loadDebounceTimer = null;
let userMarker = null;

async function loadDataForCenter(lat, lng) {
  const statusEl = document.getElementById('status-bar');

  userLat = lat;
  userLng = lng;

  statusEl.textContent = 'Hämtar barer och byggnader…';
  document.getElementById('bar-list').innerHTML =
    '<div class="loading"><div class="pulse-dots"><span></span><span></span><span></span></div><span class="loading-text">Hämtar data…</span></div>';

  let rawData;
  const cached = getCached(lat, lng);
  if (cached) {
    rawData = cached;
    statusEl.textContent = 'Använder cachad data…';
  } else {
    try {
      rawData = await fetchOverpass(lat, lng);
      setCache(lat, lng, rawData);
    } catch (e) {
      statusEl.textContent = 'Fel vid hämtning: ' + e.message;
      document.getElementById('bar-list').innerHTML =
        '<div class="empty">Kunde inte nå Overpass API. Försök igen om en stund.</div>';
      return;
    }
  }

  const { bars, buildings } = parseOverpass(rawData);

  // Fetch cloud cover in parallel with shadow computation
  fetchCloudCover(lat, lng).then(cc => {
    cloudCover = cc;
    // Re-render with cloud data once available
    if (enrichedData) {
      const date = isManualTime ? sliderToDate(parseInt(document.getElementById('time-slider').value, 10)) : new Date();
      updateForTime(date);
    }
  });

  statusEl.textContent = `${bars.length} barer, ${buildings.length} byggnader — beräknar skuggor…`;
  document.getElementById('bar-list').innerHTML =
    '<div class="loading"><div class="pulse-dots"><span></span><span></span><span></span></div><span class="loading-text">Beräknar skuggor…</span></div>';

  await new Promise(r => setTimeout(r, 30));

  enrichedData = bars.map(bar => {
    const nb = nearbyBuildings(bar.lat, bar.lng, buildings);
    return { bar, nb };
  });

  const date = isManualTime ? sliderToDate(parseInt(document.getElementById('time-slider').value, 10)) : new Date();
  updateForTime(date);
}

async function main() {
  const statusEl = document.getElementById('status-bar');

  statusEl.textContent = 'Hämtar din position…';
  const loc = await getLocation();
  if (loc) { userLat = loc.lat; userLng = loc.lng; }
  else statusEl.textContent = 'Plats ej tillgänglig — använder Södermalm';

  leafletMap = L.map('map', { zoomControl: false }).setView([userLat, userLng], 15);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap · CARTO', maxZoom: 19
  }).addTo(leafletMap);
  userMarker = L.circleMarker([userLat, userLng], {
    radius: 7, color: '#b5651d', fillColor: '#d4956a', fillOpacity: 1, weight: 2
  }).addTo(leafletMap).bindPopup('Du är här');

  renderSunMeta(userLat, userLng, new Date());
  initTimePicker();

  // Reload data when the map is moved
  leafletMap.on('moveend', () => {
    clearTimeout(loadDebounceTimer);
    loadDebounceTimer = setTimeout(() => {
      const c = leafletMap.getCenter();
      // Only reload if center moved meaningfully (>100 m)
      if (distM(userLat, userLng, c.lat, c.lng) > 100) {
        loadDataForCenter(c.lat, c.lng);
      }
    }, 800);
  });

  await loadDataForCenter(userLat, userLng);
  startAutoRefresh();
}

main().catch(err => {
  document.getElementById('status-bar').textContent = 'Fel: ' + err.message;
  document.getElementById('bar-list').innerHTML = '<div class="empty">' + err.message + '</div>';
  console.error(err);
});
</script>
